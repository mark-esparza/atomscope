<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" role="img" aria-labelledby="title desc">
  <title id="title">Protein 3D style render</title>
  <desc id="desc">Stylized ribbon illustration suggesting a folded 3D protein structure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06100d" />
      <stop offset="100%" stop-color="#102018" />
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#2effb6" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#2effb6" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ribbon1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#45ffd1" />
      <stop offset="100%" stop-color="#00aa7a" />
    </linearGradient>
    <linearGradient id="ribbon2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#76ffd8" />
      <stop offset="100%" stop-color="#0f8a66" />
    </linearGradient>
    <linearGradient id="ribbon3" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#57ffbe" />
      <stop offset="100%" stop-color="#0e6d53" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blurred"/>
      <feMerge>
        <feMergeNode in="blurred"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="620" fill="url(#bg)"/>
  <ellipse cx="450" cy="310" rx="340" ry="220" fill="url(#halo)"/>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)">
    <path d="M120 350 C 200 170, 340 520, 430 280 C 490 120, 660 520, 780 260"
          stroke="url(#ribbon1)" stroke-width="28"/>
    <path d="M90 260 C 230 80, 360 460, 470 210 C 560 60, 700 420, 820 180"
          stroke="url(#ribbon2)" stroke-width="20"/>
    <path d="M120 420 C 240 300, 360 560, 510 330 C 620 160, 700 470, 810 330"
          stroke="url(#ribbon3)" stroke-width="18"/>

    <path d="M150 320 C 220 220, 280 410, 360 290 C 430 180, 500 370, 590 250"
          stroke="#b4ffe9" stroke-opacity="0.55" stroke-width="7"/>
    <path d="M260 380 C 340 300, 420 490, 520 360 C 590 270, 680 400, 750 320"
          stroke="#c8fff0" stroke-opacity="0.45" stroke-width="6"/>
  </g>

  <g fill="#d7fff2" fill-opacity="0.9">
    <circle cx="127" cy="350" r="8"/>
    <circle cx="430" cy="280" r="8"/>
    <circle cx="780" cy="260" r="8"/>
    <circle cx="90" cy="260" r="7"/>
    <circle cx="470" cy="210" r="7"/>
    <circle cx="820" cy="180" r="7"/>
    <circle cx="120" cy="420" r="6"/>
    <circle cx="510" cy="330" r="6"/>
    <circle cx="810" cy="330" r="6"/>
  </g>
</svg>
